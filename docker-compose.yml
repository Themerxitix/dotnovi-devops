services:
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgres://dotnovi:dotnovi@db:5432/dotnovi 
    depends_on:
      - db 
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: dotnovi
      POSTGRES_PASSWORD: dotnovi
      POSTGRES_DB: dotnovi
    volumes:
      - ./src/db/init.sql:/docker-entrypoint-initdb.d/init.sql