apiVersion: apps/v1
kind: Deployment
metadata:
  name: database-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: database                
  template:
    metadata:
      labels:
        app: database              
    spec:
      containers:
        - name: database
          image: postgres:16           
          ports:
            - containerPort: 5432   
          envFrom:
            - configMapRef:
                name: database-config      
            - secretRef:
                name: database-secrets 
          volumeMounts:
            - name: init-script
              mountPath: /docker-entrypoint-initdb.d     
      volumes:
          - name: init-script
            configMap:
              name: database-init            